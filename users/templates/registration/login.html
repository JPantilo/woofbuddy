{% extends 'base.html' %}

{% block title %}Login - Woof Buddy{% endblock %}

{% block content %}
<div style="max-width: 450px; margin: 2rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">
            <i class="fas fa-sign-in-alt"></i> Welcome Back
        </h2>
        
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <div class="card" style="background: rgba(255,0,0,0.1); border-color: red; margin-bottom: 1rem; padding: 1rem;">
                    Your username and password didn't match. Please try again.
                </div>
            {% endif %}
            
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" class="form-control" autofocus required id="id_username">
            </div>
            
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" class="form-control" required id="id_password">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Login
            </button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--card-border); padding-top: 1.5rem;">
            <p>Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary);">Sign up here</a>.</p>
        </div>
    </div>
</div>
{% endblock %}
